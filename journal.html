<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Journal System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; display:flex; }

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#1f2d3d;
  color:white;
  height:100vh;
  padding:15px;
}

.sidebar h2 { color:#fff; }
.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  background:#34495e;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
}

textarea { height:60px; }

button { cursor:pointer; padding:6px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Journal</h2>
  <button onclick="showSection('journal')">Journal</button>
  <button onclick="showSection('appointments')">Timer</button>
  <button onclick="showSection('calendar')">Kalender</button>
  <button onclick="showSection('referrals')">Henvisning</button>
  <button onclick="showSection('prescriptions')">Resept</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- LOGIN -->
<div id="login">
  <h2>Logg inn</h2>
  <input id="code" placeholder="Kode">
  <button onclick="login()">Logg inn</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1>Pasientjournal</h1>
<div id="patientInfo"></div>

<!-- JOURNAL -->
<div id="journal" class="section">
<h2>Journal</h2>
<input id="title" placeholder="Tittel">
<textarea id="diagnosis" placeholder="Diagnoser"></textarea>
<textarea id="anamnesis" placeholder="Anamnese"></textarea>
<textarea id="plan" placeholder="Plan"></textarea>
<button onclick="saveJournal()">Lagre</button>
<div id="journals"></div>
</div>

<!-- TIMER -->
<div id="appointments" class="section" style="display:none">
<h2>Timer</h2>
<input id="date" placeholder="Dato">
<input id="time" placeholder="Tid">
<input id="reason" placeholder="Grunn">
<button onclick="saveAppointment()">Lagre</button>
<div id="appointmentsList"></div>
</div>

<!-- KALENDER -->
<div id="calendar" class="section" style="display:none">
<h2>Kalender</h2>
<div id="calendarList"></div>
</div>

<!-- HENVISNING -->
<div id="referrals" class="section" style="display:none">
<h2>Henvisning</h2>
<input id="hospital" placeholder="Sykehus">
<input id="dept" placeholder="Avdeling">
<input id="refReason" placeholder="Grunn">
<button onclick="saveReferral()">Lagre</button>
<button onclick="makeEpikrise()">Lag epikrise</button>
<div id="refList"></div>
</div>

<!-- RESEPT -->
<div id="prescriptions" class="section" style="display:none">
<h2>Resept</h2>
<input id="medInput" placeholder="Medisin (Nexium...)">
<input id="type" placeholder="Blå / Hvit">
<textarea id="note" placeholder="Notater"></textarea>
<input id="code1518" placeholder="Kode 1518">
<button onclick="savePrescription()">Lagre resept</button>
<div id="presList"></div>
</div>

</div>
</div>

<script>
const { jsPDF } = window.jspdf;

// LOGIN
function login(){
  if(document.getElementById("code").value=="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  } else alert("Feil kode");
}

// NAV
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

// PASIENT
const patientId = new URLSearchParams(location.search).get('id');
let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let patient = patients.find(p=>p.id==patientId) || {fullname:"Test Pasient"};

document.getElementById("patientInfo").innerHTML = patient.fullname;

// JOURNAL
function saveJournal(){
  let j = JSON.parse(localStorage.getItem("journal")||"[]");
  j.push({patientId,title:title.value,diagnosis:diagnosis.value,anamnesis:anamnesis.value,plan:plan.value});
  localStorage.setItem("journal",JSON.stringify(j));
  loadJournal();
}

function loadJournal(){
  let j = JSON.parse(localStorage.getItem("journal")||"[]").filter(x=>x.patientId==patientId);
  journals.innerHTML="";
  j.forEach((a,i)=>{
    journals.innerHTML+=`<div class="card">${a.title}<br><button onclick="pdf(${i})">PDF</button></div>`;
  });
}

// PDF
function pdf(i){
  let j = JSON.parse(localStorage.getItem("journal")||"[]").filter(x=>x.patientId==patientId);
  let d = j[i];
  const doc=new jsPDF();
  doc.text("EPIKRISE",10,10);
  doc.text(patient.fullname,10,20);
  doc.text(d.title,10,30);
  doc.save("epikrise.pdf");
}

// TIMER
function saveAppointment(){
  let a = JSON.parse(localStorage.getItem("appointments")||"[]");
  a.push({patientId,date:date.value,time:time.value,reason:reason.value});
  localStorage.setItem("appointments",JSON.stringify(a));
  loadAppointments();
  loadCalendar();
}

function loadAppointments(){
  let a = JSON.parse(localStorage.getItem("appointments")||"[]").filter(x=>x.patientId==patientId);
  appointmentsList.innerHTML="";
  a.forEach(x=>{
    appointmentsList.innerHTML+=`<div class="card">${x.date} ${x.time} - ${x.reason}</div>`;
  });
}

// KALENDER
function loadCalendar(){
  let a = JSON.parse(localStorage.getItem("appointments")||"[]");
  calendarList.innerHTML="";
  a.forEach(x=>{
    calendarList.innerHTML+=`<div class="card">${x.time} - ${x.reason}</div>`;
  });
}

// HENVISNING
function saveReferral(){
  let r = JSON.parse(localStorage.getItem("referrals")||"[]");
  r.push({patientId,hospital:hospital.value,dept:dept.value,reason:refReason.value});
  localStorage.setItem("referrals",JSON.stringify(r));
  loadRef();
}

function makeEpikrise(){
  let j = JSON.parse(localStorage.getItem("journal")||"[]");
  j.push({patientId,title:"Henvisning",diagnosis:refReason.value});
  localStorage.setItem("journal",JSON.stringify(j));
  loadJournal();
}

function loadRef(){
  let r = JSON.parse(localStorage.getItem("referrals")||"[]").filter(x=>x.patientId==patientId);
  refList.innerHTML="";
  r.forEach(x=>{
    refList.innerHTML+=`<div class="card">${x.hospital} - ${x.dept}</div>`;
  });
}

// RESEPT
const meds = ["Nexium","Montelukast","Paracet"];

medInput.addEventListener("input",()=>{
  let val = medInput.value.toLowerCase();
  let match = meds.find(m=>m.toLowerCase().startsWith(val));
  if(match) medInput.value = match;
});

function savePrescription(){
  if(code1518.value!="1518"){ alert("Feil kode"); return; }
  let p = JSON.parse(localStorage.getItem("prescriptions")||"[]");
  p.push({patientId,med:medInput.value,type:type.value,note:note.value});
  localStorage.setItem("prescriptions",JSON.stringify(p));
  loadPres();
}

function loadPres(){
  let p = JSON.parse(localStorage.getItem("prescriptions")||"[]").filter(x=>x.patientId==patientId);
  presList.innerHTML="";
  p.forEach(x=>{
    presList.innerHTML+=`<div class="card">${x.med} (${x.type})</div>`;
  });
}

// LOAD
loadJournal();
loadAppointments();
loadCalendar();
loadRef();
loadPres();
</script>

</body>
</html>
