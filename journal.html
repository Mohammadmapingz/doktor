<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Pasientjournal</title>
<style>
body { font-family: Arial; margin:20px; background:#f5f5f5; }
.container { max-width:1000px; margin:auto; background:white; padding:20px; }
h2,h3 { text-align:center; }
input, textarea, select { width:100%; padding:6px; margin:5px 0; }
textarea { height:80px; }
button { padding:8px; margin:5px 0; cursor:pointer; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; background:#fafafa; white-space: pre-line; }
.autocomplete-suggestions { border:1px solid #ccc; background:white; position:absolute; z-index:1000; max-height:100px; overflow-y:auto; }
.autocomplete-suggestion { padding:4px; cursor:pointer; }
.autocomplete-suggestion:hover { background:#eee; }
</style>
</head>
<body>

<div class="container">
<h2>Pasientjournal</h2>

<h3>Pasientinfo</h3>
<div id="patientInfo"></div>

<h3>Timer</h3>
<input id="appointmentDate" type="date">
<input id="appointmentTime" type="time">
<input id="appointmentReason" placeholder="Grunn for time">
<textarea id="appointmentNotes" placeholder="Notater"></textarea>
<button onclick="addAppointment()">Legg til time</button>
<div id="appointmentsList"></div>

<h3>Henvisninger</h3>
<input id="refHospital" placeholder="Sykehus">
<input id="refDepartment" placeholder="Avdeling">
<input id="refReason" placeholder="Grunn for henvisning">
<textarea id="refNotes" placeholder="Notater"></textarea>
<button onclick="addReferral()">Legg til henvisning</button>
<div id="referralsList"></div>

<h3>Rekvirerte resepter</h3>
<input id="medicationInput" placeholder="Skriv medisin...">
<div id="autocomplete" class="autocomplete-suggestions"></div>
<input id="medicationNotes" placeholder="Notater">
<input id="medicationCode" placeholder="Sikkerhetskode">
<button onclick="addMedication()">Legg til resept</button>
<div id="medicationList"></div>

<h3>Epikrise (tekstfelt)</h3>
<input id="epiTitle" placeholder="Tittel">
<input id="epiDiagnosis" placeholder="Diagnoser">
<textarea id="epiAnamnesis" placeholder="Anamnese"></textarea>
<textarea id="epiPlan" placeholder="Framtidsplan"></textarea>

<label for="epiRefSelect">Velg relevant henvisning:</label>
<select id="epiRefSelect"></select>

<input id="epiDoctor" placeholder="Lege som skriver epikrise">

<button onclick="addEpikrise()">Legg til Epikrise</button>
<div id="epikriseText"></div>

</div>

<script>
const patientId = new URLSearchParams(location.search).get('id');
let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let patient = patients.find(p=>p.id==patientId) || {fullname:"Ukjent", fnr:"", address:"", postcode:"", city:""};

// Medisiner forslag
const meds = ["Nexium","Montelukast","Paracet","Ibux","Voltaren","Prednisolon","Amoxicillin"];

// --- PASIENTINFO ---
function updatePatientInfo(){
    patientInfo.innerText = `Navn: ${patient.fullname}\nFødselsnummer: ${patient.fnr}\nAdresse: ${patient.address}, ${patient.postcode} ${patient.city}\nOverlege: Mohammad Arkan Osman\nAkershus universitetssykehus HF, Øre-nese-hals poliklinikk`;
}

// --- TIMER ---
function addAppointment(){
    const date = appointmentDate.value;
    const time = appointmentTime.value;
    const reason = appointmentReason.value;
    const notes = appointmentNotes.value;

    const appointments = JSON.parse(localStorage.getItem("appointments")||"[]");
    appointments.push({patientId,date,time,reason,notes});
    localStorage.setItem("appointments", JSON.stringify(appointments));
    renderAppointments();
    appointmentDate.value=""; appointmentTime.value=""; appointmentReason.value=""; appointmentNotes.value="";
}

function renderAppointments(){
    const appointments = JSON.parse(localStorage.getItem("appointments")||"[]").filter(a=>a.patientId==patientId);
    appointmentsList.innerHTML = "";
    appointments.forEach(a=>{
        const div = document.createElement("div");
        div.className="card";
        div.innerText = `${a.date} ${a.time} - ${a.reason}\n${a.notes}`;
        appointmentsList.appendChild(div);
    });
}

// --- HENVISNINGER ---
function addReferral(){
    const hospital = refHospital.value;
    const department = refDepartment.value;
    const reason = refReason.value;
    const notes = refNotes.value;

    const referrals = JSON.parse(localStorage.getItem("referrals")||"[]");
    referrals.push({patientId,hospital,department,reason,notes});
    localStorage.setItem("referrals", JSON.stringify(referrals));
    renderReferrals();
    loadReferralOptions();
    refHospital.value=""; refDepartment.value=""; refReason.value=""; refNotes.value="";
}

function renderReferrals(){
    const referrals = JSON.parse(localStorage.getItem("referrals")||"[]").filter(r=>r.patientId==patientId);
    referralsList.innerHTML="";
    referrals.forEach(r=>{
        const div = document.createElement("div");
        div.className="card";
        div.innerText = `${r.hospital} - ${r.department}\n${r.reason}\n${r.notes}`;
        referralsList.appendChild(div);
    });
}

// --- RESEPTER ---
function addMedication(){
    const med = medicationInput.value;
    const notes = medicationNotes.value;
    const code = medicationCode.value;

    const medications = JSON.parse(localStorage.getItem("medications")||"[]");
    medications.push({patientId,med,notes,code});
    localStorage.setItem("medications", JSON.stringify(medications));
    renderMedications();
    medicationInput.value=""; medicationNotes.value=""; medicationCode.value="";
}

function renderMedications(){
    const medications = JSON.parse(localStorage.getItem("medications")||"[]").filter(m=>m.patientId==patientId);
    medicationList.innerHTML="";
    medications.forEach(m=>{
        const div = document.createElement("div");
        div.className="card";
        div.innerText = `${m.med} - Notater: ${m.notes} - Kode: ${m.code}`;
        medicationList.appendChild(div);
    });
}

// --- EPIKRISE ---
function loadReferralOptions(){
    const refs = JSON.parse(localStorage.getItem("referrals")||"[]").filter(r=>r.patientId==patientId);
    epiRefSelect.innerHTML = "<option value=''>Ingen</option>";
    refs.forEach((r,i)=>{
        epiRefSelect.innerHTML += `<option value="${i}">${r.hospital} - ${r.department} - ${r.reason}</option>`;
    });
}

function addEpikrise(){
    const title = epiTitle.value;
    const diagnosis = epiDiagnosis.value;
    const anamnesis = epiAnamnesis.value;
    const plan = epiPlan.value;
    const doctor = epiDoctor.value || "Ukjent lege";

    const refs = JSON.parse(localStorage.getItem("referrals")||"[]").filter(r=>r.patientId==patientId);
    const selectedIndex = epiRefSelect.value;
    const relevantRef = selectedIndex !== "" ? refs[selectedIndex] : null;

    let text = "======================\n";
    text += "EPIKRISE\n";
    text += `Pasient: ${patient.fullname}\nFødselsnummer: ${patient.fnr}\nAdresse: ${patient.address}, ${patient.postcode} ${patient.city}\n`;
    text += `Overlege: ${doctor}\nAkershus universitetssykehus HF, Øre-nese-hals poliklinikk\n\n`;
    text += `Tittel: ${title}\nDiagnoser: ${diagnosis}\nAnamnese: ${anamnesis}\nPlan: ${plan}\n\n`;

    if(relevantRef){
        text += "Relevant henvisning:\n";
        text += `${relevantRef.hospital} - ${relevantRef.department}\nGrunn: ${relevantRef.reason}\nNotater: ${relevantRef.notes}\n\n`;
    }

    // Timer
    const appointments = JSON.parse(localStorage.getItem("appointments")||"[]").filter(a=>a.patientId==patientId);
    if(appointments.length>0){ 
        text += "Timer:\n"; 
        appointments.forEach(a=>{text+=`${a.date} ${a.time} - ${a.reason}\n`}); 
        text+="\n"; 
    }

    epikriseText.innerText += text;

    const epikrisers = JSON.parse(localStorage.getItem("epikriser")||"[]");
    epikrisers.push({patientId,title,diagnosis,anamnesis,plan,doctor,relevantRef});
    localStorage.setItem("epikriser", JSON.stringify(epikrisers));

    epiTitle.value=""; epiDiagnosis.value=""; epiAnamnesis.value=""; epiPlan.value=""; epiDoctor.value=""; epiRefSelect.value="";
}

// --- INIT ---
updatePatientInfo();
renderAppointments();
renderReferrals();
renderMedications();
loadReferralOptions();
</script>

</body>
</html>
