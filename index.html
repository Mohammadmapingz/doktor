<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Lege Login</title>
  <style>
    body { font-family: Arial; display: flex; height: 100vh; justify-content: center; align-items: center; background: #f0f0f0; }
    .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    input { display: block; margin: 10px 0; padding: 8px; width: 100%; }
    button { padding: 10px; width: 100%; cursor: pointer; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Lege Login</h2>
    <input type="password" id="code" placeholder="Skriv kode">
    <button onclick="login()">Logg inn</button>
  </div>

  <script>
    const correctCode = "1234"; // Sett din kode her

    function login() {
      const code = document.getElementById("code").value;
      if(code === correctCode) {
        window.location.href = "main.html";
      } else {
        alert("Feil kode!");
      }
    }
  </script>
</body>
</html>
