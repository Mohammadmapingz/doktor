<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Henvisning Avansert</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f5f5; }

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

h2 { text-align:center; }

input, select, textarea {
  width:100%;
  padding:6px;
  margin:5px 0;
}

textarea { height:100px; }

button {
  padding:8px;
  margin:5px 0;
  cursor:pointer;
}

.card {
  border:1px solid #ccc;
  padding:10px;
  margin:10px 0;
  background:#fafafa;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>Henvisning</h2>

<input id="hospital" placeholder="Sykehus (f.eks Ahus)">
<input id="department" placeholder="Avdeling">
<input id="reason" placeholder="Grunn for henvisning">
<textarea id="notes" placeholder="Notater"></textarea>

<h3>Legg ved tidligere epikrise (som tekst)</h3>
<select id="journalSelect"></select>

<button onclick="saveReferral()">Lagre henvisning</button>
<button onclick="createEpikrise()">Lag Epikrise (tekstfelt)</button>
<button onclick="generatePDF()">Last ned PDF av henvisning</button>

<h3>Tidligere henvisninger</h3>
<div id="refList"></div>

<h3>Epikrise tekstfelt</h3>
<div id="epikriseText"></div>

</div>

<script>
const { jsPDF } = window.jspdf;

// PASIENT
const patientId = new URLSearchParams(location.search).get('id');
let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let patient = patients.find(p => p.id == patientId) || {fullname:"Ukjent", fnr:"", address:"", postcode:"", city:""};

// LOAD JOURNAL OPTIONS
function loadJournalOptions(){
  let journals = JSON.parse(localStorage.getItem("journal")||"[]").filter(j => j.patientId==patientId);
  journalSelect.innerHTML = "<option value=''>Ingen</option>";
  journals.forEach((j,i)=>{
    journalSelect.innerHTML += `<option value="${i}">${j.title} (${j.date || ""})</option>`;
  });
}

// SAVE HENVISNING
function saveReferral(){
  let refs = JSON.parse(localStorage.getItem("referrals")||"[]");
  let journals = JSON.parse(localStorage.getItem("journal")||"[]").filter(j => j.patientId==patientId);
  let selected = journalSelect.value;
  let attached = selected !== "" ? journals[selected] : null;

  refs.push({
    patientId,
    hospital: hospital.value,
    department: department.value,
    reason: reason.value,
    notes: notes.value,
    attached
  });
  localStorage.setItem("referrals", JSON.stringify(refs));
  loadReferrals();
}

// CREATE EPIKRISE (TEKST)
function createEpikrise(){
  let j = JSON.parse(localStorage.getItem("journal")||"[]");
  let selected = journalSelect.value;
  let attached = selected !== "" ? j.filter(jj=>jj.patientId==patientId)[selected] : null;

  let text = "";
  text += "======================\n";
  text += "EPIKRISE\n";
  text += "Pasient: " + patient.fullname + "\n";
  text += "Fødselsnummer: " + patient.fnr + "\n";
  text += "Adresse: " + patient.address + ", " + patient.postcode + " " + patient.city + "\n";
  text += "Overlege: Mohammad Arkan Osman\n";
  text += "Akershus universitetssykehus HF, Øre-nese-hals poliklinikk\n\n";

  text += "Grunn for henvisning: " + reason.value + "\n";
  text += "Notater: " + notes.value + "\n\n";

  if(attached){
    text += "Vedlagt tidligere epikrise:\n";
    text += "Tittel: " + attached.title + "\n";
    text += "Diagnoser: " + attached.diagnosis + "\n";
    text += "Anamnese: " + attached.anamnesis + "\n";
    text += "Plan: " + attached.plan + "\n\n";
  }

  text += "======================\n";

  epikriseText.innerText = text;
}

// LOAD REFERRALS
function loadReferrals(){
  let refs = JSON.parse(localStorage.getItem("referrals")||"[]").filter(r=>r.patientId==patientId);
  refList.innerHTML="";
  refs.forEach(r=>{
    const div = document.createElement("div");
    div.className="card";
    let attachedText = r.attached ? "\nVedlagt epikrise: " + r.attached.title : "";
    div.innerText = `${r.hospital} - ${r.department}\nGrunn: ${r.reason}${attachedText}`;
    refList.appendChild(div);
  });
}

// GENERATE PDF (HENVISNING)
function generatePDF(){
  let refs = JSON.parse(localStorage.getItem("referrals")||"[]").filter(r=>r.patientId==patientId);
  if(refs.length==0){ alert("Ingen henvisning å lage PDF av"); return;}
  let ref = refs[refs.length-1]; // siste henvisning

  const doc = new jsPDF();
  let y=10;
  function line(txt,size=11){
    doc.setFontSize(size);
    let split = doc.splitTextToSize(txt,180);
    doc.text(split,10,y);
    y+=split.length*7;
  }

  // HEADER FAST
  line("Akershus universitetssykehus HF",12);
  line("Øre-nese-hals poliklinikk",12);
  line("Overlege Mohammad Arkan Osman",12);
  y+=5;

  line("Pasient: " + patient.fullname);
  line("Fødselsnummer: " + patient.fnr);
  line("Adresse: " + patient.address + ", " + patient.postcode + " " + patient.city);
  y+=5;

  line("Sykehus: " + ref.hospital);
  line("Avdeling: " + ref.department);
  line("Grunn: " + ref.reason);
  line("Notater: " + ref.notes);
  y+=5;

  if(ref.attached){
    line("Vedlagt epikrise:");
    line("Tittel: " + ref.attached.title);
    line("Diagnoser: " + ref.attached.diagnosis);
    line("Anamnese: " + ref.attached.anamnesis);
    line("Plan: " + ref.attached.plan);
    y+=5;
  }

  doc.setFontSize(8);
  doc.text("-----------------------", 10, 280);
  doc.text("Akershus universitetssykehus org nr postboks 1478 Lørenskog www.ahus.no",10,285);

  doc.save("henvisning.pdf");
}

// INIT
loadJournalOptions();
loadReferrals();
</script>

</body>
</html>
